name: Build

on: [push]

jobs:
  build:
    runs-on: windows-2019
    
    steps:
    - uses: actions/checkout@v2
    
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1.1
      
    - name: Build Release Win32
      run: msbuild HLS_Multihack.sln /p:Configuration=Release /p:Platform=x86
